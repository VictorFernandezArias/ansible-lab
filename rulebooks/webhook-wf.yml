---
- name: RB - Webhook Hello World
  hosts: all

  sources:
    - ansible.eda.webhook:
        host: 0.0.0.0
        port: 5000

  rules:
    - name: Run WF - Hello World
      condition:
        all:
          - event.payload.run == true
      actions:
        - debug:
            msg: "Payload: {{ event.payload }}"

        - run_workflow_template:
            name: "WF - Hello World"
            organization: "Default"
            job_args:
              extra_vars:
                source: "eda-webhook"
                incoming_payload: "{{ event.payload }}"
